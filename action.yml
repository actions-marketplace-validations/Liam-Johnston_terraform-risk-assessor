name: "Terraform Risk Assessor"
description: "AI-powered risk assessment for Terraform plan changes. Supports OpenAI, Anthropic, and Gemini."
author: "liamjohnston"

branding:
  icon: "shield"
  color: "orange"

inputs:
  plan-json:
    description: "Path to the Terraform plan JSON file (output of `terraform show -json <planfile>`)"
    required: true
  provider:
    description: "AI provider to use: openai, anthropic, or gemini"
    required: true
  api-key:
    description: "API key for the chosen AI provider"
    required: true
  model:
    description: "Model name to use (e.g. gpt-4o, claude-sonnet-4-20250514, gemini-2.0-flash)"
    required: true
  comment-on-pr:
    description: "Whether to post the risk assessment as a PR comment (true/false)"
    required: false
    default: "true"
  github-token:
    description: "GitHub token for posting PR comments. Defaults to the automatic GITHUB_TOKEN."
    required: false
    default: ${{ github.token }}

outputs:
  risk-level:
    description: "Overall risk level: critical, high, medium, low, or info"
  assessment:
    description: "Full risk assessment markdown text"

runs:
  using: "node20"
  main: "dist/index.js"
